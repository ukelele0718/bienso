name: Seeded Flow Regression

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  seeded-flow:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: vehicle_lpr
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vehicle_lpr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/vehicle_lpr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/backend/requirements.txt

      - name: Run DB migrations
        run: |
          PYTHONPATH=apps/backend python apps/backend/scripts/run_migrations.py

      - name: Reset deterministic seeded fixture
        run: |
          python scripts/reset_seeded_test_state.py

      - name: Start backend API
        run: |
          PYTHONPATH=apps/backend nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &

      - name: Wait for backend readiness
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time"
          cat backend.log || true
          exit 1

      - name: Run seeded flow regression tests
        run: |
          python scripts/test_seeded_flow.py --base-url http://localhost:8000

      - name: Show backend log on failure
        if: failure()
        run: |
          echo "=== backend.log ==="
          cat backend.log || true
