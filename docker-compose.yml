version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: vehicle_lpr_postgres
    environment:
      POSTGRES_DB: vehicle_lpr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - vehicle_lpr_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./apps/backend
    container_name: vehicle_lpr_backend
    environment:
      APP_DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/vehicle_lpr
      APP_INITIAL_BALANCE_VND: 100000
      APP_CHARGE_PER_EVENT_VND: 2000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    command: >
      /bin/sh -c "python scripts/run_migrations.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  mock_server:
    build:
      context: ./apps/mock_server
    container_name: vehicle_lpr_mock_server
    ports:
      - "8088:8088"
    volumes:
      - ./data/processed/vnlp_xe_may_sample10/images:/data/processed/vnlp_xe_may_sample10/images:ro
    environment:
      DATA_PATH: /data/processed/vnlp_xe_may_sample10/images
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  vehicle_lpr_pgdata:
